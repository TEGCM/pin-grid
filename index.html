<!DOCTYPE html>
<html>
<head>
  <title>Green Pin Grid</title>
  <style>
    body { text-align: center; font-family: Arial; }
    .container { position: relative; display: inline-block; }
    #greenImage { max-width: 900px; width: 100%; display: block; }
    #gridCanvas { position: absolute; top: 0; left: 0; }
    button { padding: 8px 12px; margin: 6px; }
  </style>
</head>
<body>

<h2>Green Grid Test</h2>
<button id="modeBtn">Enter Admin Mode</button>
<p id="modeLabel">Mode: Staff (view only)</p>

<div class="container">
  <img src="green.jpg" id="greenImage">
  <canvas id="gridCanvas"></canvas>
</div>

<script>
  const img = document.getElementById("greenImage");
  const canvas = document.getElementById("gridCanvas");
  const ctx = canvas.getContext("2d");

  // ===== SETTINGS =====
  let cellSize = 20;                 // try 15 / 20 / 25
  const ADMIN_PASSWORD = "1234";     // CHANGE THIS

  // ===== STATE =====
  let isAdmin = false;
  let rows = 0;
  let cols = 0;
  let grid = [];

  // ===== ADMIN / STAFF TOGGLE =====
  document.getElementById("modeBtn").addEventListener("click", function () {
    if (!isAdmin) {
      const pw = prompt("Enter admin password:");
      if (pw === ADMIN_PASSWORD) {
        isAdmin = true;
        this.innerText = "Exit Admin Mode";
        document.getElementById("modeLabel").innerText = "Mode: Admin (editing enabled)";
      } else {
        alert("Wrong password");
      }
    } else {
      isAdmin = false;
      this.innerText = "Enter Admin Mode";
      document.getElementById("modeLabel").innerText = "Mode: Staff (view only)";
    }
  });

  // ===== LOAD IMAGE + GRID =====
  img.onload = function () {
    canvas.width = img.width;
    canvas.height = img.height;

    cols = Math.floor(canvas.width / cellSize);
    rows = Math.floor(canvas.height / cellSize);

    // Try to load saved grid
    const saved = localStorage.getItem("pinGrid_v1");

    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        // Only use saved data if it matches current rows/cols
        if (parsed.length === rows && parsed[0].length === cols) {
          grid = parsed;
        } else {
          grid = makeBlankGrid(rows, cols);
          localStorage.removeItem("pinGrid_v1");
        }
      } catch (e) {
        grid = makeBlankGrid(rows, cols);
        localStorage.removeItem("pinGrid_v1");
      }
    } else {
      grid = makeBlankGrid(rows, cols);
    }

    drawGrid();
  };

  function makeBlankGrid(rCount, cCount) {
    const g = [];
    for (let r = 0; r < rCount; r++) {
      g[r] = [];
      for (let c = 0; c < cCount; c++) {
        g[r][c] = 0; // 0 = allowed, 1 = no-cup
      }
    }
    return g;
  }

  function drawGrid() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {

        // red overlay (more transparent so you can see contours)
        if (grid[r][c] === 1) {
          ctx.fillStyle = "rgba(255,0,0,0.25)";
          ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
        }

        // grid lines (lighter)
        ctx.strokeStyle = "rgba(0,0,0,0.30)";
        ctx.strokeRect(c * cellSize, r * cellSize, cellSize, cellSize);
      }
    }
  }

  // ===== CLICK TO TOGGLE (ADMIN ONLY) =====
  canvas.addEventListener("click", function (e) {
    if (!isAdmin) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const col = Math.floor(x / cellSize);
    const row = Math.floor(y / cellSize);

    // Safety check
    if (row < 0 || row >= rows || col < 0 || col >= cols) return;

    grid[row][col] = (grid[row][col] === 1) ? 0 : 1;

    // Save
    localStorage.setItem("pinGrid_v1", JSON.stringify(grid));

    drawGrid();
  });
</script>

</body>
</html>
