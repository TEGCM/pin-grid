<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pin Rotation Map</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f2f2f2;
}

.app {
  max-width: 850px;
  margin: auto;
  padding: 10px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.selectors,
.tools {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
  align-items: center;
}

label {
  font-weight: bold;
}

select,
button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
}

select {
  border: 1px solid #bbb;
  background: white;
}

button {
  background: #222;
  color: white;
  cursor: pointer;
}

.map-wrap {
  position: relative;
  width: 100%;
  overflow: hidden;
  border-radius: 10px;
  background: #ccc;
  touch-action: none;
  margin-top: 10px;
}

.map-inner {
  position: relative;
  transform-origin: top left;
  cursor: grab;
}

.map-inner.dragging {
  cursor: grabbing;
}

.green-image {
  width: 100%;
  display: block;
  pointer-events: none;
  user-select: none;
}

.status,
.gps-box,
.pin-box {
  margin-top: 10px;
  padding: 10px;
  background: white;
  border-radius: 10px;
  font-size: 14px;
  color: #333;
}

.pin-box {
  font-weight: bold;
  font-size: 16px;
}

@media (max-width: 520px) {
  .topbar {
    align-items: stretch;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="topbar">
    <div id="modeLabel">Staff View</div>
  </div>

  <div class="selectors">
    <label for="courseSelect">Course</label>
    <select id="courseSelect">
      <option value="eagle">Eagle</option>
      <option value="talon">Talon</option>
    </select>

    <label for="holeSelect">Hole</label>
    <select id="holeSelect"></select>
  </div>

  <div class="tools">
    <button onclick="zoomIn()">Zoom In</button>
    <button onclick="zoomOut()">Zoom Out</button>
    <button onclick="resetView()">Reset View</button>
    <button onclick="detectNearestGreen()">Use GPS Nearest Green</button>
  </div>

  <div class="pin-box" id="pinRotationBox">
    Today’s Location: --
  </div>

  <div class="gps-box" id="gpsStatus">
    GPS not checked yet.
  </div>

  <div class="status" id="statusText">
    Viewing Eagle 1.
  </div>

  <div class="map-wrap" id="mapWrap">
    <div class="map-inner" id="mapInner">
      <img src="" class="green-image" id="greenImage" alt="Green image">
    </div>
  </div>

</div>

<script>
const mapWrap = document.getElementById("mapWrap");
const mapInner = document.getElementById("mapInner");
const greenImage = document.getElementById("greenImage");
const courseSelect = document.getElementById("courseSelect");
const holeSelect = document.getElementById("holeSelect");
const statusText = document.getElementById("statusText");
const gpsStatus = document.getElementById("gpsStatus");
const pinRotationBox = document.getElementById("pinRotationBox");

const greenLocations = [
  { course: "eagle", hole: 1, lat: 26.292575846472182, lng: -81.62863149601503 },
  { course: "eagle", hole: 2, lat: 26.299442888440904, lng: -81.62683313587326 },
  { course: "eagle", hole: 3, lat: 26.30355660205257, lng: -81.62629691453907 },
  { course: "eagle", hole: 4, lat: 26.303776688033146, lng: -81.62878627915862 },
  { course: "eagle", hole: 5, lat: 26.30253962150146, lng: -81.63407455677972 },
  { course: "eagle", hole: 6, lat: 26.302228184466394, lng: -81.62815995294925 },
  { course: "eagle", hole: 7, lat: 26.299160251906603, lng: -81.63056999602074 },
  { course: "eagle", hole: 8, lat: 26.296396758890136, lng: -81.6295342205975 },
  { course: "eagle", hole: 9, lat: 26.29385306172216, lng: -81.63118061132948 },
  { course: "eagle", hole: 10, lat: 26.293840046671903, lng: -81.63805872538641 },
  { course: "eagle", hole: 11, lat: 26.29481735088768, lng: -81.63406471298511 },
  { course: "eagle", hole: 12, lat: 26.296635725225084, lng: -81.63582625264549 },
  { course: "eagle", hole: 13, lat: 26.300884828619505, lng: -81.63730942506642 },
  { course: "eagle", hole: 14, lat: 26.297370896901615, lng: -81.6387650879107 },
  { course: "eagle", hole: 15, lat: 26.29240481819569, lng: -81.6396608799952 },
  { course: "eagle", hole: 16, lat: 26.291772420023598, lng: -81.63546147596871 },
  { course: "eagle", hole: 17, lat: 26.292115701792884, lng: -81.63334211504196 },
  { course: "eagle", hole: 18, lat: 26.288908263336314, lng: -81.63182763366952 },

  { course: "talon", hole: 1, lat: 26.284375895287894, lng: -81.62810495643377 },
  { course: "talon", hole: 2, lat: 26.283260740137806, lng: -81.62902126117415 },
  { course: "talon", hole: 3, lat: 26.27835065666168, lng: -81.63026157266331 },
  { course: "talon", hole: 4, lat: 26.276550250347608, lng: -81.63479962803791 },
  { course: "talon", hole: 5, lat: 26.27568602705279, lng: -81.63376862384692 },
  { course: "talon", hole: 6, lat: 26.27614276810462, lng: -81.62705484875279 },
  { course: "talon", hole: 7, lat: 26.27953266141029, lng: -81.62654246144855 },
  { course: "talon", hole: 8, lat: 26.283384855914225, lng: -81.62641031498522 },
  { course: "talon", hole: 9, lat: 26.287651489266604, lng: -81.62769955332699 },
  { course: "talon", hole: 10, lat: 26.284555105016306, lng: -81.6307296926437 },
  { course: "talon", hole: 11, lat: 26.280718538598446, lng: -81.63301481459554 },
  { course: "talon", hole: 12, lat: 26.281651031521953, lng: -81.63509552431097 },
  { course: "talon", hole: 13, lat: 26.281397956802266, lng: -81.64010378135805 },
  { course: "talon", hole: 14, lat: 26.279302667939923, lng: -81.63803887699223 },
  { course: "talon", hole: 15, lat: 26.278958108424163, lng: -81.63470214702748 },
  { course: "talon", hole: 16, lat: 26.28008277064246, lng: -81.63297201500129 },
  { course: "talon", hole: 17, lat: 26.28361284132305, lng: -81.6316609492703 },
  { course: "talon", hole: 18, lat: 26.28808816487806, lng: -81.63209074889177 }
];

let scale = 1;
let translateX = 0;
let translateY = 0;

let isDragging = false;
let startX = 0;
let startY = 0;
let dragStartX = 0;
let dragStartY = 0;

function populateHoleSelect() {
  holeSelect.innerHTML = "";
  for (let i = 1; i <= 18; i++) {
    const option = document.createElement("option");
    option.value = String(i);
    option.textContent = String(i);
    holeSelect.appendChild(option);
  }
}

function getCurrentBaseName() {
  return `${courseSelect.value}-${holeSelect.value}`;
}

function updateImage() {
  const base = getCurrentBaseName();
  greenImage.src = `${base}.jpg`;
  greenImage.alt = `${courseSelect.value} ${holeSelect.value}`;
}

function updateStatus() {
  const courseName = courseSelect.value.charAt(0).toUpperCase() + courseSelect.value.slice(1);
  statusText.textContent = `Viewing ${courseName} ${holeSelect.value}.`;
}

function changeGreen() {
  updateImage();
  resetView();
  updateStatus();
}

function applyTransform() {
  mapInner.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
}

function zoomAtPoint(clientX, clientY, deltaScale) {
  const rect = mapWrap.getBoundingClientRect();

  const mouseX = clientX - rect.left;
  const mouseY = clientY - rect.top;

  const oldScale = scale;
  const newScale = Math.max(1, Math.min(4, oldScale + deltaScale));

  if (newScale === oldScale) return;

  const contentX = (mouseX - translateX) / oldScale;
  const contentY = (mouseY - translateY) / oldScale;

  scale = newScale;
  translateX = mouseX - contentX * newScale;
  translateY = mouseY - contentY * newScale;

  if (scale <= 1) {
    translateX = 0;
    translateY = 0;
  }

  applyTransform();
}

function zoomIn() {
  const rect = mapWrap.getBoundingClientRect();
  zoomAtPoint(rect.left + rect.width / 2, rect.top + rect.height / 2, 0.1);
}

function zoomOut() {
  const rect = mapWrap.getBoundingClientRect();
  zoomAtPoint(rect.left + rect.width / 2, rect.top + rect.height / 2, -0.1);
}

function resetView() {
  scale = 1;
  translateX = 0;
  translateY = 0;
  applyTransform();
}

function toRadians(deg) {
  return deg * Math.PI / 180;
}

function getDistanceFeet(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = toRadians(lat2 - lat1);
  const dLon = toRadians(lon2 - lon1);

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  const meters = R * c;
  return meters * 3.28084;
}

function detectNearestGreen() {
  if (!navigator.geolocation) {
    gpsStatus.textContent = "This device/browser does not support GPS location.";
    return;
  }

  gpsStatus.textContent = "Checking GPS location...";

  navigator.geolocation.getCurrentPosition(
    (position) => {
      const userLat = position.coords.latitude;
      const userLng = position.coords.longitude;

      let nearest = null;
      let nearestDistance = Infinity;

      for (const green of greenLocations) {
        const distance = getDistanceFeet(userLat, userLng, green.lat, green.lng);
        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearest = green;
        }
      }

      if (!nearest) {
        gpsStatus.textContent = "No green coordinates are loaded yet.";
        return;
      }

      courseSelect.value = nearest.course;
      holeSelect.value = String(nearest.hole);
      changeGreen();

      const courseName = nearest.course.charAt(0).toUpperCase() + nearest.course.slice(1);
      gpsStatus.textContent = `Nearest green detected: ${courseName} ${nearest.hole} (${Math.round(nearestDistance)} ft away).`;
    },
    (error) => {
      if (error.code === error.PERMISSION_DENIED) {
        gpsStatus.textContent = "Location permission was denied.";
      } else {
        gpsStatus.textContent = "Unable to get GPS location.";
      }
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

function pointerDown(x, y) {
  if (scale <= 1) return;

  isDragging = true;
  mapInner.classList.add("dragging");
  startX = x;
  startY = y;
  dragStartX = translateX;
  dragStartY = translateY;
}

function pointerMove(x, y) {
  if (!isDragging) return;

  const dx = x - startX;
  const dy = y - startY;

  translateX = dragStartX + dx;
  translateY = dragStartY + dy;
  applyTransform();
}

function pointerUp() {
  isDragging = false;
  mapInner.classList.remove("dragging");
}

function getTodaysLetter() {
  const startDate = new Date(2026, 2, 22); // March 22, 2026 = A
  const today = new Date();

  startDate.setHours(0, 0, 0, 0);
  today.setHours(0, 0, 0, 0);

  const diffTime = today - startDate;
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  const letters = ["A", "B", "C", "D", "E", "F"];
  const index = ((diffDays % 6) + 6) % 6;

  return letters[index];
}

function updatePinRotationDisplay() {
  const letter = getTodaysLetter();
  pinRotationBox.textContent = `Today’s Location: ${letter}`;
}

mapWrap.addEventListener("wheel", (e) => {
  e.preventDefault();
  const delta = e.deltaY < 0 ? 0.1 : -0.1;
  zoomAtPoint(e.clientX, e.clientY, delta);
}, { passive: false });

mapWrap.addEventListener("dblclick", (e) => {
  zoomAtPoint(e.clientX, e.clientY, 0.2);
});

mapWrap.addEventListener("mousedown", e => pointerDown(e.clientX, e.clientY));
window.addEventListener("mousemove", e => pointerMove(e.clientX, e.clientY));
window.addEventListener("mouseup", pointerUp);

mapWrap.addEventListener("touchstart", e => {
  if (e.touches.length > 0) {
    pointerDown(e.touches[0].clientX, e.touches[0].clientY);
  }
}, { passive: true });

mapWrap.addEventListener("touchmove", e => {
  if (e.touches.length > 0) {
    pointerMove(e.touches[0].clientX, e.touches[0].clientY);
  }
}, { passive: true });

mapWrap.addEventListener("touchend", pointerUp);

courseSelect.addEventListener("change", changeGreen);
holeSelect.addEventListener("change", changeGreen);

populateHoleSelect();
holeSelect.value = "1";
changeGreen();
updatePinRotationDisplay();
</script>

</body>
</html>
